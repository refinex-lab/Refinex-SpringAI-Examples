server:
  port: 9091

spring:
  application:
    name: spring-ai-getting-started

  ai:
    model:
      # 指定使用哪个 Provider 的 Chat Model
      # 值对应 SpringAIModels 枚举：openai / deepseek / ollama / anthropic 等
      chat: deepseek
      # 指定使用哪个 Provider 的 Embedding Model
      embedding: openai

    # ── DeepSeek ────────────────────────────────────
    deepseek:
      # DeepSeek API Key
      api-key: ${DEEPSEEK_API_KEY}
      # DeepSeek Chat Model 配置
      chat:
        # DeepSeek Chat Model 选项
        options:
          # DeepSeek Chat Model 名称
          model: deepseek-chat
          # DeepSeek Chat Model 温度
          temperature: 0.7

    # ── OpenAI（仅用于 Embedding / 备用 Chat）────────
    openai:
      # OpenAI API Key
      api-key: ${OPENAI_API_KEY}
      # OpenAI Chat Model 配置
      chat:
        # OpenAI Chat Model 选项
        options:
          # OpenAI Chat Model 名称
          model: gpt-4o-mini
          # OpenAI Chat Model 温度
          temperature: 0.7

    # ── Ollama（本地开发 / 测试）───────────────────
    ollama:
      # Ollama Base URL
      base-url: http://localhost:11434
      # Ollama Chat Model 配置
      chat:
        # Ollama Chat Model 选项
        options:
          # Ollama Chat Model 名称
          model: qwen2.5
